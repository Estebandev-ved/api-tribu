# =============================================
# TRIBU E-COMMERCE — CONFIGURACIÓN DE BASE DE DATOS
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/tribu_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# SERVIDOR
# =============================================
server.port=8080

# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET:TribuEcommerceSecretKeyMuySuperSegura2024PutumayoColombia}
jwt.expiration=86400000

# =============================================
# EMAIL (Gmail SMTP)
# IMPORTANTE: usa una App Password de Google, no tu contraseña normal
# Ir a: https://myaccount.google.com/apppasswords
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tucorreo@gmail.com
spring.mail.password=${MAIL_PASSWORD:tu-app-password-de-16-caracteres}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# SUBIDA DE ARCHIVOS (imágenes)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# =============================================
# SPRING SECURITY (desactiva form login, usamos JWT)
# =============================================
spring.security.user.name=admin
spring.security.user.password=admin
